# Build refsprogs for Windows via Ubuntu + mingw-w64 cross-compile.
name: build

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  build_windows:
    name: windows-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            host: x86_64-w64-mingw32
          - arch: i686
            host: i686-w64-mingw32
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install \
            autoconf \
            automake \
            libtool \
            pkg-config \
            build-essential \
            mingw-w64

      - name: Generate build system
        run: ./autogen.sh

      - name: Configure (cross-compile for ${{ matrix.host }})
        run: |
          ./configure \
            --host=${{ matrix.host }} \
            --disable-refs-fuse \
            --disable-library \
            CFLAGS="-O2 -Wall" \
            LDFLAGS="-static -static-libgcc"

      - name: Build
        run: make -j$(nproc)

      - name: Stage artifacts
        run: |
          mkdir -p dist/refsprogs-windows-${{ matrix.arch }}
          cp util/*.exe dist/refsprogs-windows-${{ matrix.arch }}/
          cp README COPYING AUTHORS NEWS ChangeLog dist/refsprogs-windows-${{ matrix.arch }}/
          ${{ matrix.host }}-strip dist/refsprogs-windows-${{ matrix.arch }}/*.exe
          ls -la dist/refsprogs-windows-${{ matrix.arch }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: refsprogs-windows-${{ matrix.arch }}
          path: dist/refsprogs-windows-${{ matrix.arch }}
          if-no-files-found: error

  release:
    name: Attach to release
    needs: build_windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package
        run: |
          cd dist
          for d in refsprogs-windows-*; do
            zip -r "${d}.zip" "$d"
          done
          ls -la

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
