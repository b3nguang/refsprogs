# Build refsprogs for Windows via Ubuntu + mingw-w64 cross-compile.
#
# Produces a flat dist directory containing:
#   - the util binaries (refsls.exe, refscat.exe, ...) dynamically linked
#     to librefs-13.dll
#   - librefs-13.dll (the shared library, for FFI / library consumers)
#   - librefs.dll.a (mingw import library, for build-time linking)
#   - include/refs/*.h (public headers)
#   - README / COPYING / AUTHORS / NEWS / ChangeLog
name: build

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  build_windows:
    name: windows-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            host: x86_64-w64-mingw32
          - arch: i686
            host: i686-w64-mingw32
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install \
            autoconf \
            automake \
            libtool \
            pkg-config \
            build-essential \
            mingw-w64

      - name: Generate build system
        run: ./autogen.sh

      # `--enable-shared --disable-static` tells libtool to emit a DLL +
      # mingw import library (.dll.a) instead of a static archive.
      # `-static-libgcc` keeps the DLL / .exe free of the libgcc_s_seh-1.dll
      # runtime dependency (the equivalent of the libewf / libbde DLLs that
      # downstream consumers expect to be self-contained).
      - name: Configure (cross-compile for ${{ matrix.host }})
        run: |
          ./configure \
            --host=${{ matrix.host }} \
            --disable-refs-fuse \
            --enable-shared \
            --disable-static \
            CFLAGS="-O2 -Wall" \
            LDFLAGS="-static-libgcc -Wl,--no-undefined"

      - name: Build
        run: make -j$(nproc)

      # libtool on mingw lays the real artifacts under .libs/. The wrappers
      # in util/ and librefs/ are scripts that wouldn't run on Windows.
      - name: Stage artifacts
        run: |
          out=dist/refsprogs-windows-${{ matrix.arch }}
          mkdir -p "$out/include/refs"
          # .exe binaries (dynamically linked to librefs-13.dll which sits
          # next to them, so users can still just unzip and run).
          cp util/.libs/*.exe "$out/" 2>/dev/null || cp util/*.exe "$out/"
          # The shared library itself. Naming is `librefs-${LIBREFS_VERSION}.dll`
          # per configure.ac (currently 13). Glob covers future version bumps.
          cp librefs/.libs/librefs-*.dll "$out/"
          # mingw import library — for downstreams that want build-time linking.
          cp librefs/.libs/librefs.dll.a "$out/" || true
          # Public headers so downstreams can `#include <refs/fsapi.h>`.
          cp include/refs/*.h "$out/include/refs/"
          cp README COPYING AUTHORS NEWS ChangeLog "$out/"
          ${{ matrix.host }}-strip "$out"/*.exe "$out"/*.dll
          ls -laR "$out/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: refsprogs-windows-${{ matrix.arch }}
          path: dist/refsprogs-windows-${{ matrix.arch }}
          if-no-files-found: error

  release:
    name: Attach to release
    needs: build_windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package
        run: |
          cd dist
          for d in refsprogs-windows-*; do
            zip -r "${d}.zip" "$d"
          done
          ls -la

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
